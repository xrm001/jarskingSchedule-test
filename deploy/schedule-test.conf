server {
    listen 80;
    server_name schedule-test.jarsking.cn;

    return 301 https://schedule-test.jarsking.cn$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name schedule-test.jarsking.cn;

    ssl_certificate /etc/nginx/certs/schedule-test.jarsking.cn.pem;
    ssl_certificate_key /etc/nginx/certs/schedule-test.jarsking.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://jarsking_schedule_test:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
